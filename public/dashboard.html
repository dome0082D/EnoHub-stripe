<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EnoHub - Dashboard</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        :root { --main: #8a1c1c; --grey: #f8f9fa; }
        body { font-family: sans-serif; margin: 0; background: #fdfdfd; }
        
        /* MENU A SCOMPARSA */
        .sidebar { position: fixed; top: 0; left: -280px; width: 280px; height: 100vh; background: #1a1a1a; color: white; transition: 0.4s; z-index: 1000; padding-top: 60px; }
        .sidebar.active { left: 0; }
        .sidebar a { display: block; padding: 18px 25px; color: #ccc; text-decoration: none; border-bottom: 1px solid #333; cursor: pointer; }
        .menu-btn { position: fixed; top: 15px; left: 15px; z-index: 1100; background: var(--main); color: white; border: none; padding: 10px 15px; border-radius: 5px; cursor: pointer; }

        .content { margin-left: 0; padding: 80px 5% 40px 5%; transition: 0.4s; }
        .card { 
            background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 20px rgba(0,0,0,0.05); margin-bottom: 25px;
            background: linear-gradient(rgba(255,255,255,0.9), rgba(255,255,255,0.9)), url('https://images.unsplash.com/photo-1504275107627-0c2ba7a43dba?q=20&w=1200') center/cover fixed;
        }

        .eh-badge { display: inline-flex; align-items: center; color: #28a745; font-weight: bold; background: #e6ffed; padding: 5px 12px; border-radius: 20px; font-size: 14px; border: 1px solid #28a745; }
        .eh-badge span { color: var(--main); border: 1px solid var(--main); padding: 1px 4px; border-radius: 4px; font-size: 10px; margin-right: 6px; }

        .tasting-box { border: 2px dashed #ddd; padding: 20px; border-radius: 10px; margin-top: 15px; background: rgba(255,255,255,0.8); }
        .btn-main { background: var(--main); color: white; border: none; padding: 12px 25px; border-radius: 8px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>
    <button class="menu-btn" onclick="toggleMenu()">☰ Menu</button>
    <nav class="sidebar" id="sidebar">
        <h3 style="padding:0 25px;">EnoHub Diamond</h3>
        <a onclick="show('profile')">👤 Profilo Pubblico</a>
        <a id="nav-tastings" onclick="show('tastings')" style="display:none;">🍷 Note di Degustazione</a>
        <a onclick="show('chat')">💬 Community Network</a>
        <a onclick="show('subs')">💎 Upgrade Piano</a>
        <a onclick="show('settings')">⚙️ Modifica Profilo</a>
        <hr><a onclick="logout()" style="color:red;">🚪 Esci</a>
    </nav>

    <div class="content">
        <section id="sec-profile"></section>

        <section id="sec-tastings" style="display:none;">
            <div class="card">
                <h2>Note di degustazione</h2>
                <div class="tasting-box">
                    <input type="text" id="t-vino" placeholder="Nome del vino e annata..." style="width:100%; padding:10px; margin-bottom:10px; border-radius:5px; border:1px solid #ccc;">
                    <textarea id="t-note" placeholder="Descrivi la tua degustazione..." style="width:100%; height:100px; padding:10px; border-radius:5px; border:1px solid #ccc;"></textarea>
                    <input type="file" onchange="upTasting(this)" style="margin-top:10px;">
                    <div id="t-preview" style="margin-top:10px;"></div>
                    <button onclick="saveTasting()" class="btn-main" style="margin-top:15px; width:100%;">Salva Degustazione</button>
                </div>
                <div id="tastings-archive" style="margin-top:30px;"></div>
            </div>
        </section>

        <section id="sec-chat" style="display:none;">
            <div style="display:grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap:20px;">
                <div class="card"><h3>🤵 Sommelier</h3><div id="l-somm"></div></div>
                <div class="card"><h3>🍷 Cantine</h3><div id="l-cant"></div></div>
            </div>
        </section>

        <section id="sec-subs" style="display:none;">
            <h2>Scegli il tuo Upgrade</h2>
            <div style="display:grid; grid-template-columns:1fr 1fr; gap:20px;">
                <div class="card" style="text-align:center;">
                    <h3>Piano Pro</h3><p>€15.00</p>
                    <button onclick="pay('Pro', 15, 'card')" class="btn-main">Paga con Carta</button>
                </div>
                <div class="card" style="text-align:center;">
                    <h3>Piano Business</h3><p>€29.00</p>
                    <button onclick="pay('Business', 29, 'card')" class="btn-main">Paga con Carta</button>
                </div>
            </div>
        </section>
    </div>

    <script>
        function toggleMenu() { document.getElementById('sidebar').classList.toggle('active'); }
        let user = JSON.parse(localStorage.getItem('enohub_user'));
        if(!user) window.location.href = "/index.html";

        async function refresh() {
            const r = await fetch('/api/user/'+user._id); user = await r.json();
            localStorage.setItem('enohub_user', JSON.stringify(user));
            if(user.tipo === 'Sommelier') document.getElementById('nav-tastings').style.display = 'block';
            show(sessionStorage.getItem('last_v') || 'profile');
        }
        refresh();

        function show(id) {
            sessionStorage.setItem('last_v', id);
            document.querySelectorAll('section').forEach(s => s.style.display = 'none');
            document.getElementById('sec-'+id).style.display = 'block';
            if(id === 'profile') renderP();
            if(id === 'tastings') renderT();
            if(id === 'chat') loadC();
            toggleMenu();
        }

        function renderP() {
            const badge = user.isVerified ? `<div class="eh-badge"><span>EH</span> ✅ Verificato</div>` : '';
            document.getElementById('sec-profile').innerHTML = `
                <div class="card">
                    <h1>${user.nome} ${badge}</h1>
                    <p>📍 ${user.location} • <b>${user.piano}</b></p>
                    <hr><h3>Biografia</h3><p>${user.bio || 'Nessuna descrizione.'}</p>
                </div>`;
        }

        let tmpFile = '';
        async function upTasting(input) {
            const fd = new FormData(); fd.append('file', input.files[0]); fd.append('ownerId', user._id);
            const r = await fetch('/api/upload', {method:'POST', body:fd}); const m = await r.json();
            tmpFile = m.url; document.getElementById('t-preview').innerHTML = `<img src="${m.url}" style="height:80px; border-radius:5px;">`;
        }

        async function saveTasting() {
            const v = document.getElementById('t-vino').value; const n = document.getElementById('t-note').value;
            const deg = user.degustazioni || []; deg.push({vino:v, nota:n, img:tmpFile, date:new Date()});
            await fetch('/api/user/'+user._id, {method:'PUT', headers:{'Content-Type':'application/json'}, body:JSON.stringify({degustazioni:deg})});
            location.reload();
        }

        function renderT() {
            const l = document.getElementById('tastings-archive'); l.innerHTML = '';
            (user.degustazioni || []).reverse().forEach(d => {
                l.innerHTML += `<div class="card" style="display:flex; gap:20px; align-items:center;">
                    ${d.img ? `<img src="${d.img}" style="width:100px;height:100px;object-fit:cover;border-radius:10px;">` : ''}
                    <div><b>${d.vino}</b><br><small>${new Date(d.date).toLocaleDateString()}</small><p>${d.nota}</p></div>
                </div>`;
            });
        }

        async function loadC() {
            const r = await fetch('/api/users'); const users = await r.json();
            const ls = document.getElementById('l-somm'); const lc = document.getElementById('l-cant');
            ls.innerHTML = ''; lc.innerHTML = '';
            users.filter(u => u._id !== user._id).forEach(u => {
                let btn = `<button onclick="alert('Chat coming soon')" class="btn-main" style="padding:5px 10px;">Chat</button>`;
                if(user.tipo === 'Cantina' && u.tipo === 'Sommelier' && !user.unlockedContacts.includes(u._id)) {
                    btn = `<button onclick="payUnlock('${u._id}')" style="background:black; color:white; border:none; padding:8px 12px; border-radius:5px;">Sblocca (€15)</button>`;
                }
                const h = `<div style="display:flex; justify-content:space-between; padding:12px; border-bottom:1px solid #eee;"><div><b>${u.nome}</b> ${u.isVerified?'✅':''}<br><small>${u.location}</small></div>${btn}</div>`;
                if(u.tipo === 'Sommelier') ls.innerHTML += h; else lc.innerHTML += h;
            });
        }

        async function payUnlock(tid) {
            const r = await fetch('/api/create-checkout', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({piano:'Sblocca Sommelier', prezzo:15, type:'unlock', targetId:tid, userId:user._id})});
            const d = await r.json(); if(d.url) window.location.href = d.url;
        }

        async function pay(p, v, m) {
            const r = await fetch('/api/create-checkout', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({piano:p, prezzo:v, userId:user._id, type:'upgrade'})});
            const d = await r.json(); if(d.url) window.location.href = d.url;
        }

        function logout() { localStorage.clear(); sessionStorage.clear(); window.location.href="/index.html"; }
    </script>
</body>
</html>
