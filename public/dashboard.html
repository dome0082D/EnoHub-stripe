<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EnoHub - Dashboard</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        :root { --main: #8a1c1c; --grey: #f8f9fa; --border: #e2e8f0; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: #fafafa; }
        
        /* MENU A SCOMPARSA GRIGIO CHIARO */
        .sidebar { position: fixed; top: 0; left: -280px; width: 280px; height: 100vh; background: var(--grey); border-right: 1px solid var(--border); transition: 0.4s; z-index: 1000; padding-top: 60px; }
        .sidebar.active { left: 0; }
        .sidebar a { display: block; padding: 18px 25px; color: #444; text-decoration: none; border-bottom: 1px solid #eee; cursor: pointer; }
        .menu-btn { position: fixed; top: 15px; left: 15px; z-index: 1100; background: var(--main); color: white; border: none; padding: 10px 15px; border-radius: 5px; cursor: pointer; }

        .content { padding: 80px 5% 40px 5%; }
        .card { 
            background: rgba(255,255,255,0.95); padding: 30px; border-radius: 18px; box-shadow: 0 4px 20px rgba(0,0,0,0.06); margin-bottom: 25px;
            background: linear-gradient(rgba(255,255,255,0.9), rgba(255,255,255,0.9)), url('https://images.unsplash.com/photo-1504275107627-0c2ba7a43dba?q=20&w=1200') center/cover fixed;
        }

        .eh-badge { display: inline-flex; align-items: center; color: #28a745; font-weight: bold; background: #e6ffed; padding: 5px 12px; border-radius: 20px; font-size: 14px; border: 1px solid #28a745; }
        .eh-badge span { color: var(--main); border: 1px solid var(--main); padding: 1px 4px; border-radius: 4px; font-size: 10px; margin-right: 6px; }

        .btn-main { background: var(--main); color: white; border: none; padding: 12px 25px; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .preview-img { height: 100px; border-radius: 8px; margin-top: 10px; border: 2px solid var(--main); display: none; }
        
        .tasting-item { display: flex; gap: 20px; background: white; padding: 15px; border-radius: 12px; margin-bottom: 15px; border: 1px solid #eee; align-items: center; position: relative; }
        .btn-action { padding: 5px 10px; border-radius: 5px; border: none; cursor: pointer; font-size: 12px; font-weight: bold; margin-left: 5px; }
    </style>
</head>
<body>
    <button class="menu-btn" onclick="toggleMenu()">☰ Menu</button>
    <nav class="sidebar" id="sidebar">
        <h3 style="padding:0 25px; color:var(--main);">EnoHub Diamond</h3>
        <a onclick="show('profile')">👤 Il mio Profilo</a>
        <a id="nav-tastings" onclick="show('tastings')" style="display:none; font-weight:bold;">🍷 Diario Degustazioni</a>
        <a onclick="show('subs')">💎 Upgrade Piano</a>
        <a id="nav-admin" onclick="show('admin')" style="display:none; color:orange;">🛡️ Staff Panel</a>
        <hr><a onclick="logout()" style="color:red;">🚪 Esci</a>
    </nav>

    <div class="content">
        <section id="sec-profile"></section>

        <section id="sec-tastings" style="display:none;">
            <div class="card">
                <h2 id="tasting-title">Aggiungi Degustazione</h2>
                <div style="background:rgba(255,255,255,0.8); padding:20px; border-radius:10px;">
                    <input type="text" id="t-vino" placeholder="Nome Vino..." style="width:100%; padding:12px; margin-bottom:10px; border-radius:8px; border:1px solid #ddd;">
                    <textarea id="t-note" placeholder="Descrizione..." style="width:100%; height:80px; padding:12px; border-radius:8px; border:1px solid #ddd;"></textarea>
                    
                    <div style="margin-top:10px;">
                        <label><b>Foto Etichetta:</b></label><br>
                        <input type="file" id="t-file" onchange="previewAndUpload(this)">
                        <img id="t-preview" class="preview-img" alt="Anteprima">
                    </div>

                    <button id="t-save-btn" onclick="saveTasting()" class="btn-main" style="margin-top:20px; width:100%; background:#27ae60;">SALVA DEGUSTAZIONE</button>
                    <button id="t-cancel-edit" onclick="resetTastingForm()" class="btn-main" style="margin-top:10px; width:100%; background:#666; display:none;">ANNULLA MODIFICA</button>
                </div>
                <hr><div id="tastings-list"></div>
            </div>
        </section>

        <section id="sec-subs" style="display:none;">
            <div class="card" style="text-align:center;">
                <h2>Upgrade Account</h2>
                <button onclick="pay('Sommelier Pro', 15, 'card')" class="btn-main">Carta/Bancomat €15</button>
                <button onclick="pay('Sommelier Pro', 15, 'bank')" class="btn-main" style="background:#2c3e50; margin-top:10px;">Bonifico Bancario</button>
            </div>
        </section>

        <section id="sec-admin" style="display:none;" class="card">
            <h2>🛡️ Staff Panel</h2>
            <div id="admin-list"></div>
        </section>
    </div>

    <script>
        let user = JSON.parse(localStorage.getItem('enohub_user'));
        if(!user) window.location.href = "/index.html";

        function toggleMenu() { document.getElementById('sidebar').classList.toggle('active'); }

        async function refresh() {
            const r = await fetch('/api/user/'+user._id); user = await r.json();
            localStorage.setItem('enohub_user', JSON.stringify(user));
            if(user.email === 'dome0082@gmail.com') document.getElementById('nav-admin').style.display = 'block';
            if(user.tipo === 'Sommelier') document.getElementById('nav-tastings').style.display = 'block';
            show(sessionStorage.getItem('last_v') || 'profile');
        }
        refresh();

        function show(id) {
            sessionStorage.setItem('last_v', id);
            document.querySelectorAll('section').forEach(s => s.style.display = 'none');
            document.getElementById('sec-'+id).style.display = 'block';
            if(id === 'profile') renderP();
            if(id === 'tastings') renderT();
            if(id === 'admin') loadA();
            document.getElementById('sidebar').classList.remove('active');
        }

        function renderP() {
            const badge = user.isVerified ? `<div class="eh-badge"><span>EH</span> ✅ Verificato</div>` : '';
            document.getElementById('sec-profile').innerHTML = `<div class="card"><h1>${user.nome} ${badge}</h1><p>${user.piano}</p></div>`;
        }

        // --- GESTIONE DEGUSTAZIONI: ANTEPRIMA, MODIFICA, ELIMINA ---
        let tmpImageUrl = '';
        let editingId = null;

        function previewAndUpload(input) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const img = document.getElementById('t-preview');
                    img.src = e.target.result;
                    img.style.display = 'block';
                }
                reader.readAsDataURL(input.files[0]);
                
                // Upload effettivo al server
                const fd = new FormData(); fd.append('file', input.files[0]);
                fetch('/api/upload', {method:'POST', body:fd}).then(r => r.json()).then(data => {
                    tmpImageUrl = data.url;
                });
            }
        }

        async function saveTasting() {
            const vino = document.getElementById('t-vino').value;
            const nota = document.getElementById('t-note').value;
            if(!vino) return alert("Inserisci il nome del vino");

            let list = user.degustazioni || [];
            
            if(editingId) {
                // Modifica
                list = list.map(d => d.id === editingId ? { ...d, vino, nota, img: tmpImageUrl || d.img } : d);
            } else {
                // Nuovo
                list.push({ id: Date.now().toString(), vino, nota, img: tmpImageUrl, date: new Date() });
            }

            await fetch('/api/user/'+user._id, {method:'PUT', headers:{'Content-Type':'application/json'}, body:JSON.stringify({degustazioni:list})});
            location.reload();
        }

        function renderT() {
            const l = document.getElementById('tastings-list'); l.innerHTML = '';
            (user.degustazioni || []).reverse().forEach(d => {
                l.innerHTML += `
                <div class="tasting-row">
                    ${d.img ? `<img src="${d.img}" style="width:70px;height:70px;object-fit:cover;border-radius:8px;">` : '<div style="width:70px;height:70px;background:#eee;"></div>'}
                    <div style="flex:1">
                        <b>${d.vino}</b><br><small>${new Date(d.date).toLocaleDateString()}</small>
                        <p style="margin:5px 0 0 0;">${d.nota}</p>
                    </div>
                    <div>
                        <button class="btn-action" style="background:orange;color:white;" onclick="editTasting('${d.id}')">Modifica</button>
                        <button class="btn-action" style="background:red;color:white;" onclick="deleteTasting('${d.id}')">Elimina</button>
                    </div>
                </div>`;
            });
        }

        function editTasting(id) {
            const d = user.degustazioni.find(x => x.id === id);
            editingId = id;
            document.getElementById('t-vino').value = d.vino;
            document.getElementById('t-note').value = d.nota;
            document.getElementById('tasting-title').innerText = "Modifica Degustazione";
            document.getElementById('t-cancel-edit').style.display = 'block';
            if(d.img) {
                const img = document.getElementById('t-preview');
                img.src = d.img;
                img.style.display = 'block';
            }
            window.scrollTo(0,0);
        }

        async function deleteTasting(id) {
            if(!confirm("Eliminare questa nota?")) return;
            const list = user.degustazioni.filter(x => x.id !== id);
            await fetch('/api/user/'+user._id, {method:'PUT', headers:{'Content-Type':'application/json'}, body:JSON.stringify({degustazioni:list})});
            location.reload();
        }

        function resetTastingForm() {
            editingId = null; tmpImageUrl = '';
            document.getElementById('t-vino').value = '';
            document.getElementById('t-note').value = '';
            document.getElementById('t-preview').style.display = 'none';
            document.getElementById('tasting-title').innerText = "Aggiungi Degustazione";
            document.getElementById('t-cancel-edit').style.display = 'none';
        }

        async function pay(piano, prezzo, metodo) {
            if(metodo === 'card') {
                const r = await fetch('/api/create-checkout', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({piano, prezzo})});
                const d = await r.json(); if(d.url) window.location.href = d.url;
            } else {
                alert(`IBAN: IT 00 X 00000 00000 000000000000\nCausale: ${piano} - ${user.nome}`);
            }
        }

        async function loadA() {
            const r = await fetch('/api/users'); const utenti = await r.json();
            const l = document.getElementById('admin-list'); l.innerHTML = '';
            utenti.forEach(u => {
                if(u.email === user.email) return;
                l.innerHTML += `<div style="display:flex; justify-content:space-between; padding:10px;">
                    <span>${u.nome}</span>
                    <button class="btn-main" style="padding:5px 10px;" onclick="verify('${u._id}')">${u.isVerified?'Verificato':'Applica EH ✅'}</button>
                </div>`;
            });
        }

        async function verify(id) {
            await fetch('/api/admin/verify', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({adminEmail:user.email, targetId:id, verifyStatus:true})});
            loadA();
        }

        function logout() { localStorage.clear(); sessionStorage.clear(); window.location.href="/index.html"; }
    </script>
</body>
</html>
