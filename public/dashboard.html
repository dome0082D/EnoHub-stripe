<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EnoHub Gold - Dashboard</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        :root { --main: #8a1c1c; --gold: #d4af37; --side: #121212; --bg: #f5f7f9; --border: #e2e8f0; --sidebar-width: 260px; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; background: var(--bg); color: #333; }
        
        /* NAVBAR */
        .nav { background: white; padding: 12px 5%; display: flex; justify-content: space-between; border-bottom: 1px solid var(--border); align-items: center; position: sticky; top:0; z-index:100; }
        .noti-badge { background: #e74c3c; color: white; border-radius: 50%; padding: 3px 7px; font-size: 11px; position: absolute; top: -6px; right: -10px; display: none; }

        /* MENU A SCOMPARSA (PUNTO 2) */
        .sidebar-slide { position: fixed; top: 0; left: -260px; width: 260px; height: 100%; background: var(--side); color: white; transition: 0.4s; z-index: 2000; padding-top: 60px; }
        .sidebar-slide.active { left: 0; }
        .sidebar-slide a { display: block; padding: 15px 25px; color: #ccc; text-decoration: none; border-bottom: 1px solid #333; }
        .sidebar-slide a:hover { background: #333; color: white; }
        .menu-toggle-btn { position: fixed; top: 15px; left: 15px; z-index: 2001; background: var(--main); color: white; border: none; padding: 10px; border-radius: 5px; cursor: pointer; }

        /* LAYOUT PRINCIPALE */
        .main { display: flex; flex: 1; overflow: hidden; }
        .sidebar-internal { width: 240px; background: var(--side); color: white; padding: 20px; overflow-y:auto; flex-shrink: 0; }
        .content { flex: 1; padding: 30px; overflow-y: auto; }
        .card { background: white; padding: 30px; border-radius: 16px; margin-bottom: 25px; box-shadow: 0 4px 20px rgba(0,0,0,0.03); border: 1px solid #fff; }
        
        /* DESIGN PROFILO */
        .avatar { width: 120px; height: 120px; border-radius: 50%; background: var(--main); color: white; display: flex; align-items: center; justify-content: center; font-size: 45px; }
        .banner-c { height: 200px; background: #eee url('https://images.unsplash.com/photo-1504275107627-0c2ba7a43dba?q=80&w=1000') center/cover; border-radius: 16px; position: relative; margin-bottom: 50px; }
        .logo-c { width: 110px; height: 110px; background: white; border: 5px solid white; position: absolute; bottom: -30px; left: 30px; border-radius: 12px; display:flex; align-items:center; justify-content:center; font-weight:bold; color:var(--main); font-size: 24px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        
        /* CERTIFICAZIONI */
        .cert-container { position: relative; margin-bottom: 10px; }
        .cert-box { border: 2px solid #e2e8f0; background: white; color: #888; padding: 10px; border-radius: 8px; text-align: center; font-weight: bold; cursor: pointer; }
        .cert-cb:checked + .cert-box { border-color: var(--main); background: var(--main); color: white; }
        .cert-cb { display: none; }

        /* BOTTONI */
        .btn-main { background: var(--main); color: white; border: none; padding: 12px 25px; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .btn-main:hover { opacity: 0.8; }
        
        .chat-ui { position: fixed; bottom: 20px; right: 20px; width: 350px; height: 500px; background: white; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); display:none; flex-direction: column; z-index: 9999; border: 1px solid var(--border); overflow: hidden; }
        .menu-btn { width: 100%; text-align: left; background: none; border: none; color: #a0aec0; padding: 15px; cursor: pointer; font-size: 15px; border-radius: 8px; margin-bottom: 5px; }
        .menu-btn.active { color: white; background: var(--main); }
    </style>
</head>
<body>
    <button class="menu-toggle-btn" onclick="toggleSlideMenu()">☰</button>
    <nav class="sidebar-slide" id="slide-menu">
        <h3 style="padding: 0 25px;">EnoHub Menu</h3>
        <a href="/dashboard.html">🏠 Dashboard</a>
        <a href="/cantine.html">🍷 Esplora Cantine</a>
        <a href="/messaggi.html">💬 Messaggi</a>
        <a href="/logout" onclick="logout()" style="color: #ff5252;">🚪 Esci</a>
    </nav>

    <div class="nav">
        <a href="index.html" style="font-weight:900; color:var(--main); text-decoration:none; font-size: 24px; margin-left: 50px;">EnoHub</a>
        <div style="display:flex; align-items:center; gap:20px;">
            <div style="position:relative; cursor:pointer;" onclick="toggleNoti()">🔔 <span id="noti-count" class="noti-badge">0</span></div>
            <span id="nav-user" style="font-weight:600; color:#444;"></span>
        </div>
    </div>

    <div class="main">
        <div class="sidebar-internal">
            <button class="menu-btn active" id="m-profile" onclick="show('profile')">👤 Mio Profilo</button>
            <button class="menu-btn" id="m-chat" onclick="show('chat')">💬 Community</button>
            <button class="menu-btn" id="m-subs" onclick="show('subs')">💎 Upgrade</button>
            <button class="menu-btn" id="m-settings" onclick="show('settings')">⚙️ Impostazioni</button>
        </div>

        <div class="content">
            <section id="sec-profile"></section>
            <section id="sec-chat" style="display:none"><h2>EnoHub Community</h2><div id="list-sommelier"></div><div id="list-cantine"></div></section>
            <section id="sec-subs" style="display:none"><h2>Upgrade</h2><div id="pricing-list"></div></section>
            <section id="sec-settings" class="card" style="display:none"><h2>Modifica Profilo</h2><div id="settings-fields"></div><button onclick="saveSet()" class="btn-main" style="margin-top:20px;">SALVA TUTTO</button></section>
        </div>
    </div>

    <div id="chat-win" class="chat-ui">
        <div style="background:var(--main); color:white; padding:15px; display:flex; justify-content:space-between;"><b>Chat</b><button onclick="document.getElementById('chat-win').style.display='none'" style="color:white; border:none; background:none;">✕</button></div>
        <div id="c-msgs" style="flex:1; overflow-y:auto; padding:15px; background:#f9f9f9;"></div>
        <div style="display:flex; padding:10px; border-top:1px solid #eee;"><input type="text" id="c-in" style="flex:1; border:1px solid #ddd; padding:10px; border-radius:5px;"><button onclick="send()" class="btn-main" style="margin-left:5px;">➤</button></div>
    </div>

    <script>
        function toggleSlideMenu() { document.getElementById('slide-menu').classList.toggle('active'); }
        let user = JSON.parse(localStorage.getItem('enohub_user'));
        if(!user) window.location.href = "auth/login.html";

        const sigle = ['AIS', 'FISAR', 'ONAV', 'WSET', 'CMS', 'FIS', 'ASPI', 'AIES'];
        const socket = io(); socket.emit('join', user._id);

        function show(id) {
            document.querySelectorAll('section, .sidebar-internal .menu-btn').forEach(el => {
                if(el.tagName === 'SECTION') el.style.display = 'none';
                if(el.tagName === 'BUTTON') el.classList.remove('active');
            });
            document.getElementById('sec-' + id).style.display = 'block';
            document.getElementById('m-' + id).classList.add('active');
            if(id === 'profile') renderProfile();
            if(id === 'settings') renderSettings();
        }

        function renderProfile() {
            const c = document.getElementById('sec-profile');
            const initial = user.nome.charAt(0).toUpperCase();
            if(user.tipo === 'Cantina') {
                c.innerHTML = `<div class="banner-c"><div class="logo-c">${initial}</div></div><div class="card"><h1>${user.nome}</h1><p>📍 ${user.regione||'Italia'}</p><hr><h3>Note Sommelier:</h3><p>${user.noteDegustazione || '...'}</p></div>`;
            } else {
                c.innerHTML = `<div class="card"><div style="display:flex; gap:20px; align-items:center;"><div class="avatar">${initial}</div><div><h1>${user.nome}</h1><p>${user.ruolo||'Wine Professional'}</p></div></div><hr><h3>Bio:</h3><p>${user.bio||'...'}</p><h3>Note di Degustazione:</h3><p>${user.noteDegustazione||'Nessuna nota presente.'}</p></div>`;
            }
        }

        function renderSettings() {
            const s = document.getElementById('settings-fields');
            const style = "width:100%; padding:12px; margin:10px 0; border:1px solid #ddd; border-radius:8px;";
            if(user.tipo === 'Cantina') {
                // PUNTO 4: Rimosso campo Email
                s.innerHTML = `<label>Regione:</label><input id="s-reg" value="${user.regione||''}" style="${style}"><label>Sito:</label><input id="s-sito" value="${user.sito||''}" style="${style}"><label>Storia:</label><textarea id="s-storia" style="${style} height:80px;">${user.storia||''}</textarea>`;
            } else {
                let certHtml = '<div style="display:grid; grid-template-columns:repeat(4,1fr); gap:10px; margin-top:10px;">';
                sigle.forEach(sig => {
                    const isCk = user.certificazioni && user.certificazioni.includes(sig);
                    certHtml += `<label class="cert-container"><input type="checkbox" value="${sig}" class="cert-cb" ${isCk?'checked':''}><div class="cert-box">${sig}</div></label>`;
                });
                certHtml += '</div>';
                // PUNTO 3: Note Degustazione
                s.innerHTML = `<label>Bio:</label><textarea id="s-bio" style="${style}">${user.bio||''}</textarea><h3>🍷 Note di Degustazione</h3><textarea id="s-note" style="${style}; height:100px;" placeholder="Descrivi il vino assaggiato...">${user.noteDegustazione||''}</textarea><input type="file" id="up-tasting" style="margin-top:5px;">${certHtml}`;
            }
        }

        async function saveSet() {
            let d = {};
            if(user.tipo === 'Cantina') d = { regione: document.getElementById('s-reg').value, sito: document.getElementById('s-sito').value, storia: document.getElementById('s-storia').value };
            else {
                let c = []; document.querySelectorAll('.cert-cb:checked').forEach(cb => c.push(cb.value));
                d = { bio: document.getElementById('s-bio').value, noteDegustazione: document.getElementById('s-note').value, certificazioni: c.join(',') };
            }
            const r = await fetch('/api/user/'+user._id, { method:'PUT', headers:{'Content-Type':'application/json'}, body:JSON.stringify(d) });
            const j = await r.json(); localStorage.setItem('enohub_user', JSON.stringify(j.user)); location.reload();
        }

        function logout() { localStorage.removeItem('enohub_user'); window.location.href="index.html"; }
        document.getElementById('nav-user').innerText = "Ciao, " + user.nome;
        show('profile');
    </script>
</body>
</html>
