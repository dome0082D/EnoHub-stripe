<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EnoHub - Modifica Profilo</title>
    <style>
        :root { --main: #8a1c1c; --grey: #f8f9fa; }
        body { font-family: sans-serif; background: var(--grey); padding: 20px; }
        .container { max-width: 600px; margin: 0 auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        input, textarea { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #ccc; box-sizing: border-box; }
        .btn-save { background: #27ae60; color: white; border: none; padding: 15px; width: 100%; border-radius: 8px; cursor: pointer; font-weight: bold; margin-top: 15px; }
        .file-label { display: block; margin-top: 15px; font-weight: bold; color: #333; }
        .img-preview { object-fit: cover; border-radius: 8px; display: none; margin-top: 10px; border: 1px solid #ddd; }
    </style>
</head>
<body>
    <div class="container">
        <a href="dashboard.html" style="text-decoration:none; color:var(--main); font-weight:bold;">← Torna alla Dashboard</a>
        <h2 style="color:var(--main);">Modifica Profilo</h2>
        
        <label class="file-label">📸 Foto Profilo / Logo:</label>
        <input type="file" accept="image/*" onchange="uploadPic(this, 'profile')">
        <img id="m-profile-preview" class="img-preview" src="" style="width:100px; height:100px;">

        <label class="file-label">🖼️ Immagine di Sfondo Profilo (Copertina):</label>
        <input type="file" accept="image/*" onchange="uploadPic(this, 'cover')">
        <img id="m-cover-preview" class="img-preview" src="" style="width:100%; height:120px;">

        <label class="file-label" style="margin-top:20px;">Nome / Ragione Sociale:</label>
        <input type="text" id="m-nome">
        
        <label class="file-label">Città / Regione:</label>
        <input type="text" id="m-loc">
        
        <label class="file-label">Biografia / Certificati:</label>
        <textarea id="m-bio" rows="5"></textarea>
        
        <button class="btn-save" onclick="save()">💾 SALVA TUTTO</button>
    </div>

    <script>
        let user = JSON.parse(localStorage.getItem('enohub_user'));
        if(!user) window.location.href = "index.html";

        let profileUrl = user.profilePic || '';
        let coverUrl = user.coverPic || '';

        // Pre-carica immagini se esistono
        if(profileUrl) { document.getElementById('m-profile-preview').src = profileUrl; document.getElementById('m-profile-preview').style.display = 'block'; }
        if(coverUrl) { document.getElementById('m-cover-preview').src = coverUrl; document.getElementById('m-cover-preview').style.display = 'block'; }

        // Pre-carica testi
        document.getElementById('m-nome').value = user.nome;
        document.getElementById('m-loc').value = user.location || '';
        document.getElementById('m-bio').value = user.bio || '';

        async function uploadPic(input, type) {
            if(input.files && input.files[0]) {
                const fd = new FormData(); 
                fd.append('file', input.files[0]);
                
                const r = await fetch('/api/upload', {method:'POST', body:fd});
                const d = await r.json();
                
                if(type === 'profile') {
                    profileUrl = d.url;
                    document.getElementById('m-profile-preview').src = profileUrl;
                    document.getElementById('m-profile-preview').style.display = 'block';
                } else {
                    coverUrl = d.url;
                    document.getElementById('m-cover-preview').src = coverUrl;
                    document.getElementById('m-cover-preview').style.display = 'block';
                }
            }
        }

        async function save() {
            const d = { 
                nome: document.getElementById('m-nome').value, 
                location: document.getElementById('m-loc').value, 
                bio: document.getElementById('m-bio').value, 
                profilePic: profileUrl,
                coverPic: coverUrl,
                adminEmail: user.email 
            };
            
            const r = await fetch('/api/user/'+user._id, {
                method:'PUT', 
                headers:{'Content-Type':'application/json'}, 
                body:JSON.stringify(d)
            });
            
            const res = await r.json(); 
            if(res.success) { 
                localStorage.setItem('enohub_user', JSON.stringify(res.user)); 
                window.location.href="dashboard.html"; 
            } else {
                alert("Errore nel salvataggio");
            }
        }
    </script>
</body>
</html>
