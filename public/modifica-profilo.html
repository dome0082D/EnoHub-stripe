<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EnoHub - Modifica Profilo</title>
    <style>
        :root { --main: #8a1c1c; --grey: #f8f9fa; }
        body { font-family: sans-serif; background: var(--grey); padding: 20px; }
        .container { max-width: 600px; margin: 0 auto; background: white; padding: 30px; border-radius: 15px; }
        input, textarea { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #ccc; box-sizing: border-box; }
        .btn-save { background: #27ae60; color: white; border: none; padding: 15px; width: 100%; border-radius: 8px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <a href="dashboard.html" style="text-decoration:none; color:var(--main);">← Indietro</a>
        <h2>Modifica Profilo</h2>
        <label>Nome / Ragione Sociale:</label><input type="text" id="m-nome">
        <label>Città / Regione:</label><input type="text" id="m-loc">
        <label>Biografia / Certificati:</label><textarea id="m-bio" rows="5"></textarea>
        <button class="btn-save" onclick="save()">💾 SALVA TUTTO</button>
    </div>
    <script>
        let user = JSON.parse(localStorage.getItem('enohub_user'));
        document.getElementById('m-nome').value = user.nome;
        document.getElementById('m-loc').value = user.location || '';
        document.getElementById('m-bio').value = user.bio || '';
        async function save() {
            const d = { nome: document.getElementById('m-nome').value, location: document.getElementById('m-loc').value, bio: document.getElementById('m-bio').value, adminEmail: user.email };
            const r = await fetch('/api/user/'+user._id, {method:'PUT', headers:{'Content-Type':'application/json'}, body:JSON.stringify(d)});
            const res = await r.json(); if(res.success) { localStorage.setItem('enohub_user', JSON.stringify(res.user)); window.location.href="dashboard.html"; }
        }
    </script>
</body>
</html>
