<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8"><title>Registrati - EnoHub</title>
    <style>body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background: #f4f4f4; margin: 0; } .card { background: white; padding: 40px; border-radius: 15px; width: 350px; text-align: center; } input, select { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; }</style>
</head>
<body>
    <div class="card">
        <h2>Unisciti alla Rete</h2>
        <input type="text" id="nome" placeholder="Nome Completo / Azienda">
        <input type="email" id="email" placeholder="Email">
        <input type="password" id="password" placeholder="Password">
        <select id="tipo"><option value="Sommelier">Sono un Sommelier</option><option value="Cantina">Sono una Cantina</option></select>
        <button onclick="reg()" style="width:100%; padding:12px; background:#8a1c1c; color:white; border:none; border-radius:8px; font-weight:bold; cursor:pointer;">REGISTRATI ORA</button>
        <p style="font-size:12px; margin-top:15px;">Hai già un account? <a href="login.html">Accedi</a></p>
    </div>
    <script>
        async function reg() {
            const r = await fetch('/api/register', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({ nome:nome.value, email:email.value, password:password.value, tipo:tipo.value }) });
            if((await r.json()).success) { alert("Registrazione completata!"); location.href="login.html"; }
            else alert("Errore: email già esistente.");
        }
    </script>
</body>
</html>
