<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>EnoHub - Lista Cantine</title>
    <link rel="stylesheet" href="../../styles/main.css">
    <script src="../../scripts/api.js"></script>
</head>
<body>
    <header class="header">
        <div class="container header__content" style="display: flex; justify-content: space-between; align-items: center;">
            <a href="../../index.html" class="header__logo" style="color: #8b0000; font-size: 1.8rem; font-weight: bold; text-decoration: none;">EnoHub</a>
            <nav>
                <a href="../../auth/login.html" class="btn-outline" style="margin-right: 10px; padding: 8px 15px; border: 1px solid #8b0000; color: #8b0000; text-decoration: none; border-radius: 5px;">Accedi</a>
                <a href="../../auth/register.html" class="btn-red" style="background: #8b0000; color: white; padding: 8px 15px; text-decoration: none; border-radius: 5px;">Iscriviti</a>
            </nav>
        </div>
    </header>

    <div class="main-grid container" style="display: flex; gap: 30px; padding: 40px 0;">
        <aside class="filter-sidebar" style="width: 250px; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1);">
            <h3 style="color: #8b0000; border-bottom: 2px solid #8b0000; padding-bottom: 10px;">Filtra Cantine</h3>
            <div style="margin-bottom: 15px;">
                <label style="font-size: 0.9rem; font-weight: bold;">Regione:</label>
                <input type="text" id="filterRegione" placeholder="Es. Toscana" style="width: 100%; padding: 8px; margin-top: 5px;">
            </div>
            <button class="btn-red" onclick="renderCantine()" style="width: 100%; padding: 10px; background: #8b0000; color: white; border: none; border-radius: 5px; cursor: pointer;">CERCA</button>
        </aside>

        <section style="flex: 1;">
            <h2 style="color: #333;">Cantine Iscritte</h2>
            <div class="card-container" id="cantineGrid" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px;">
                </div>
        </section>
    </div>

    <script>
        async function renderCantine() {
            const res = await fetch('/api/utenti?tipo=cantina');
            const cantine = await res.json();
            const grid = document.getElementById('cantineGrid');
            
            if(cantine.length === 0) {
                grid.innerHTML = "<p>Nessuna cantina trovata. Sii il primo a registrarti!</p>";
                return;
            }

            grid.innerHTML = cantine.map(c => `
                <div class="card" style="background: white; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); overflow: hidden;">
                    <img src="../../${c.foto || 'img/default-cantina.jpg'}" style="width: 100%; height: 150px; object-fit: cover;">
                    <div style="padding: 15px;">
                        <h4 style="margin: 0 0 5px 0; color: #8b0000;">${c.nome}</h4>
                        <small style="color: #666;">${c.citta}</small>
                        <a href="cantine-profile.html?id=${c.id}" style="display: block; text-align: center; background: #eee; padding: 8px; margin-top: 15px; text-decoration: none; color: #333; border-radius: 5px;">Vedi Pagina</a>
                    </div>
                </div>
            `).join('');
        }
        renderCantine();
    </script>
</body>
</html>
