<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>EnoHub - Lista Eventi</title>
    <link rel="stylesheet" href="../../styles/main.css">
    <script src="../../scripts/api.js"></script>
</head>
<body>
    <header class="header">
        <div class="container header__content">
            <a href="../../index.html" class="header__logo">EnoHub</a>
            <p>Calendario Eventi Mondiale</p>
        </div>
    </header>

    <main class="container">
        <div class="events-table-container" style="margin-top: 50px;">
            <h2 style="color:var(--wine-red)">Tutti gli Eventi delle Cantine</h2>
            <table class="events-table" style="width:100%; border-collapse: collapse;">
                <thead>
                    <tr style="background:#f4f4f4;">
                        <th style="padding:10px;">Data</th>
                        <th style="padding:10px;">Evento</th>
                        <th style="padding:10px;">Cantina</th>
                        <th style="padding:10px;">Località</th>
                    </tr>
                </thead>
                <tbody id="eventsList">
                    </tbody>
            </table>
        </div>
    </main>

    <script>
        async function loadEvents() {
            try {
                const events = await EnoHubApi.getEventsList();
                const container = document.getElementById('eventsList');
                if (events.length === 0) {
                    container.innerHTML = "<tr><td colspan='4' style='padding:20px; text-align:center;'>Nessun evento in programma.</td></tr>";
                } else {
                    container.innerHTML = events.map(e => `
                        <tr>
                            <td style='padding:10px; border-bottom:1px solid #eee;'>${e.data}</td>
                            <td style='padding:10px; border-bottom:1px solid #eee;'>${e.titolo}</td>
                            <td style='padding:10px; border-bottom:1px solid #eee;'>${e.nomeCantina}</td>
                            <td style='padding:10px; border-bottom:1px solid #eee;'>${e.luogo}</td>
                        </tr>
                    `).join('');
                }
            } catch (e) { console.error(e); }
        }
        loadEvents();
    </script>
</body>
</html>
