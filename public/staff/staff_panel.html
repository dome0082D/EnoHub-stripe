<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Staff EnoHub - Verifiche</title>
    <link rel="stylesheet" href="../style.css">
    <style>
        .staff-container { max-width: 900px; margin: 50px auto; background: white; padding: 30px; border-radius: 15px; color: #333; }
        .user-row { display: flex; justify-content: space-between; align-items: center; padding: 15px; border-bottom: 1px solid #eee; }
        /* LA SPUNTA VERDE RICHIESTA */
        .eh-verified { display: flex; align-items: center; color: #28a745; font-weight: bold; }
        .eh-verified span { color: #8a1c1c; margin-right: 5px; border: 1px solid #8a1c1c; padding: 2px 4px; border-radius: 4px; font-size: 10px; }
        .btn-v { background: #28a745; color: white; border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body class="bg-cantina">
    <div class="staff-container">
        <h1>Controllo Account Staff</h1>
        <div id="listaUtenti"></div>
    </div>

    <script>
        async function carica() {
            const res = await fetch('/api/users');
            const utenti = await res.json();
            const div = document.getElementById('listaUtenti');
            div.innerHTML = '';
            utenti.forEach(u => {
                div.innerHTML += `
                    <div class="user-row">
                        <div><b>${u.nome}</b> (${u.email})</div>
                        <div>
                            ${u.isVerified 
                                ? `<div class="eh-verified"><span>EH</span> ✅ Verificato</div>` 
                                : `<button class="btn-v" onclick="vai('${u._id}')">Verifica Ora</button>`}
                        </div>
                    </div>
                `;
            });
        }
        async function vai(id) {
            await fetch('/api/admin/verify', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ targetId: id, adminEmail: 'dome0082@gmail.com', verifyStatus: true })
            });
            carica();
        }
        carica();
    </script>
</body>
</html>
