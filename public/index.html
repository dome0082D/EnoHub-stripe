<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EnoHub - Connessione Vinicola</title>
    <style>
        :root { --main: #8a1c1c; --light-gray: #f0f0f0; }
        
        body { 
            font-family: 'Segoe UI', Arial, sans-serif; margin: 0; padding: 0; color: #333; 
            /* SFONDO GLOBALE VIGNETI */
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('https://images.unsplash.com/photo-1504275107627-0c2ba7a43dba?q=80&w=1920') center/cover fixed;
        }

        /* HEADER & NAV */
        .nav-top { display: flex; justify-content: space-between; align-items: center; padding: 15px 5%; background: rgba(0,0,0,0.4); backdrop-filter: blur(10px); }
        .logo { color: white; font-size: 28px; font-weight: bold; text-decoration: none; }

        /* MENÙ A SCOMPARSA GRIGIO CHIARO */
        .auth-btns { display: flex; gap: 10px; }
        
        @media (max-width: 768px) {
            .auth-btns { 
                display: none; /* In un'app reale qui useresti un toggle JS */
                flex-direction: column; 
                position: absolute; top: 60px; right: 0; 
                background-color: var(--light-gray); /* GRIGIO CHIARO */
                width: 200px; padding: 20px; border-radius: 0 0 0 10px;
                box-shadow: -5px 5px 15px rgba(0,0,0,0.2);
            }
            .auth-btns.active { display: flex; }
            .auth-btns a { color: var(--main) !important; width: 100%; text-align: center; }
        }

        .auth-btns a { text-decoration: none; background: white; color: var(--main); padding: 10px 20px; border-radius: 5px; font-weight: bold; transition: 0.3s; }

        /* SEZIONI E CARD */
        .section-box { padding: 60px 5%; text-align: center; color: white; }
        .container-grid { display: flex; justify-content: center; gap: 25px; flex-wrap: wrap; }
        
        .card { 
            background: rgba(255,255,255,0.95); padding: 30px; border-radius: 15px; width: 280px; color: #333;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3); transition: 0.3s;
        }
        .card:hover { transform: translateY(-10px); }

        /* IMMAGINI FASCINO DEL VINO */
        .fascino-item { 
            position: relative; width: 300px; height: 400px; border-radius: 12px; overflow: hidden; 
            background-size: cover; background-position: center;
        }
        .img-degustazione { background-image: url('https://images.unsplash.com/photo-1510812431401-41d2bd2722f3?q=80&w=600'); }
        .img-cantina { background-image: url('https://images.unsplash.com/photo-1568213816046-0ee1c42bd559?q=80&w=600'); }
        .img-bottiglie { background-image: url('https://images.unsplash.com/photo-1511214041137-975993710720?q=80&w=600'); }

        .fascino-item span { position: absolute; bottom: 0; width: 100%; background: rgba(0,0,0,0.6); color: white; padding: 15px 0; font-weight: bold; }

        .btn-pay { background: var(--main); color: white; border: none; padding: 12px; border-radius: 5px; cursor: pointer; width: 100%; font-weight: bold; margin-top: 10px; }
    </style>
</head>
<body>

    <nav class="nav-top">
        <a href="#" class="logo">EnoHub</a>
        <div style="color: white; cursor: pointer; display: none;" id="menu-toggle" onclick="document.querySelector('.auth-btns').classList.toggle('active')">☰</div>
        <div class="auth-btns">
            <a href="/auth/login.html">Accedi</a>
            <a href="/auth/register.html">Registrati</a>
        </div>
    </nav>

    <section class="section-box">
        <h1>Piani Premium</h1>
        <div class="container-grid">
            <div class="card">
                <h3>Sommelier Pro</h3>
                <p>Metti in risalto il tuo talento</p>
                <button onclick="EnoHubApi.payWithStripe('Sommelier Pro', 15)" class="btn-pay">Carta €15</button>
                <button onclick="EnoHubApi.payWithBank('Sommelier Pro', 15)" class="btn-pay" style="background: #2c3e50;">Bonifico</button>
            </div>
            <div class="card">
                <h3>Cantina Premium</h3>
                <p>Espandi la tua visibilità</p>
                <button onclick="EnoHubApi.payWithStripe('Cantina Premium', 29)" class="btn-pay">Carta €29</button>
                <button onclick="EnoHubApi.payWithBank('Cantina Premium', 29)" class="btn-pay" style="background: #2c3e50;">Bonifico</button>
            </div>
        </div>
    </section>

    <section class="section-box" style="background: rgba(255,255,255,0.05);">
        <h2>Il fascino del vino</h2>
        <div class="container-grid">
            <div class="fascino-item img-degustazione"><span>Degustazione</span></div>
            <div class="fascino-item img-cantina"><span>Le Cantine</span></div>
            <div class="fascino-item img-bottiglie"><span>Sommelier Expert</span></div>
        </div>
    </section>

    <script src="Api.js"></script>
</body>
</html>
