<!DOCTYPE html>
<html lang="it"><head><meta charset="UTF-8"><title>EnoHub - Home</title>
<style>body { font-family: sans-serif; margin: 0; background: #fafafa; } nav { background: white; padding: 15px 5%; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 5px rgba(0,0,0,0.1); } .logo { font-size: 24px; font-weight: bold; color: #8a1c1c; text-decoration: none; } .btn { background: #8a1c1c; color: white; border: none; padding: 12px 25px; border-radius: 6px; cursor: pointer; text-decoration: none; font-weight: bold; } .hero { text-align: center; padding: 120px 20px; }</style></head>
<body>
<nav><a href="index.html" class="logo">EnoHub Gold</a><div id="nav-links"><a href="auth/login.html" class="btn">Accedi</a></div></nav>
<div class="hero"><h1>Elite del Vino Digitale</h1><p>Connettiamo Sommelier e Cantine in tutto il mondo.</p><div id="cta"><a href="auth/register.html" class="btn" style="background:#444">Registrati Ora</a></div></div>
<script>
    try { const raw = localStorage.getItem('enohub_user'); if(raw && raw !== "undefined") { const u = JSON.parse(raw); document.getElementById('nav-links').innerHTML = `<a href="dashboard.html" class="btn">Area Personale</a>`; document.getElementById('welcome').innerText = `Bentornato, ${u.nome}`; document.getElementById('cta').innerHTML = `<a href="dashboard.html" class="btn">Vai alla Dashboard</a>`; } } catch(e) { localStorage.removeItem('enohub_user'); }
</script></body></html>
