<body>
    <nav class="nav">
        <a href="/" class="logo">EnoHub</a>

        </div>
    </nav>
    <div class="hero">

        <a href="/auth/register.html" style="background:white; color:var(--main); padding: 15px 30px; border-radius: 50px; text-decoration: none; font-weight: bold;">Registrati Gratis</a>

</html>
